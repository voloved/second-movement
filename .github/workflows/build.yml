name: Build

on:
  pull_request:
  push:
    branches-ignore:
      - gh-pages

jobs: 
  build:
    container:
      image: ghcr.io/armmbed/mbed-os-env:latest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Ensure workspace directory is defined as safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Build all firmware variants
        shell: bash
        run: |
          set -e

          builds=(
            "sensorwatch_red classic"
            "sensorwatch_red custom"

            "sensorwatch_green classic"
            "sensorwatch_green custom"

            "sensorwatch_blue classic"
            "sensorwatch_blue custom"

            "sensorwatch_pro classic"
            "sensorwatch_pro custom"

            "sensorwatch_jolt jolt"
          )

          mkdir -p artifacts

          for build in "${builds[@]}"; do
            read -r BOARD DISPLAY <<< "$build"

            echo "========================================"
            echo "Building BOARD=$BOARD DISPLAY=$DISPLAY"
            echo "========================================"

            make clean

            make BOARD="$BOARD" DISPLAY="$DISPLAY"

            cp build/firmware.uf2 \
              "artifacts/${BOARD}-display-${DISPLAY}-movement.uf2"
          done
      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: firmware-builds
          path: artifacts/*.uf2

  build-simulator:
    container:
      image: emscripten/emsdk
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Ensure workspace directory is defined as safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Compile movement
        shell: bash
        run: |
          mkdir -p artifacts

          builds=(
            "sensorwatch_red classic"
            "sensorwatch_red custom"

            "sensorwatch_green classic"
            "sensorwatch_green custom"

            "sensorwatch_blue classic"
            "sensorwatch_blue custom"

            "sensorwatch_pro classic"
            "sensorwatch_pro custom"

            "sensorwatch_jolt jolt"
          )

          for build in "${builds[@]}"; do
            read -r BOARD DISPLAY <<< "$build"

            make clean
            emmake make BOARD="$BOARD" DISPLAY="$DISPLAY"

            tar -czf \
              "artifacts/${BOARD}-display-${DISPLAY}-movement.tar.gz" \
              -C build-sim \
              firmware.html firmware.wasm firmware.js
          done
        working-directory: '.'
      - name: Upload simulator build
        uses: actions/upload-artifact@v5
        with:
          name: movement-simulator
          path: artifacts/*.tar.gz
